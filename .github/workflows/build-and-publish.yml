name: Zephyr Docker Image CI
run-name: Here we build the Docker image used to build our Rovertito application 🚀
on: [push]
jobs:
  build-and-publish-develop:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Add CA certificate for registry
        run: |
          mkdir -p /etc/docker/certs.d/registry.spacebeetech.com
          echo ${{ secrets.REGISTRY_CERTIFICATE }} >> /etc/docker/certs.d/registry.spacebeetech.com/ca.crt
      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: registry.spacebeetech.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          push: true
          tags: ghcr.io/spacebee-technologies/zephyr-environment:develop
  build-and-publish-tags:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: registry.spacebeetech.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          push: true
          tags: |
            ghcr.io/spacebee-technologies/zephyr-environment:latest
            ghcr.io/spacebee-technologies/zephyr-environment:${{ github.ref_name }}
